<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基準法のPre-Opinion by箒庵</title>
<style>
  :root {
    --felt-1: #1e4d38;
    --felt-2: #0a2418;
    --rail: #143026;
    --card-face: #f6f4ee;
    --ink: #1c1c1a;
    --ink-soft: #6b6b64;
    --ink-faint: #9a9a92;
    --gold: #b8ac8e;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background:
      radial-gradient(ellipse at center, var(--felt-1) 0%, var(--felt-2) 75%);
    color: #eae7dd;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
    line-height: 1.7;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 56px 24px 28px;
  }

  header h1 {
    font-size: 45px;
    font-weight: 500;
    margin: 0;
    letter-spacing: 0.04em;
    color: #f2f0e8;
  }

  header .by {
    font-size: 14.4px;
    color: var(--gold);
    margin-top: 8px;
    letter-spacing: 0.08em;
  }

  header .subtitle {
    font-size: 16.2px;
    color: #b9b6ac;
    margin-top: 16px;
  }

  .redeal {
    margin-top: 24px;
    font-size: 14.4px;
    color: #eae7dd;
    background: transparent;
    border: 1px solid #55524a;
    border-radius: 20px;
    padding: 7px 22px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .redeal:hover { border-color: var(--gold); color: var(--gold); }

  main {
    max-width: 980px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .felt-panel {
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.15));
    border: 1px solid var(--rail);
    border-radius: 18px;
    padding: 40px 20px;
    box-shadow:
      inset 0 0 60px rgba(0,0,0,0.4),
      0 0 0 6px #111113,
      0 0 0 9px #6b1f24;
    margin: 0 6px;
  }

  .hand-label {
    text-align: center;
    font-size: 13.2px;
    color: var(--gold);
    letter-spacing: 0.15em;
    margin-bottom: 26px;
  }

  .fan {
    position: relative;
    height: 275px;
    margin: 0 auto;
    max-width: 640px;
  }

  .card {
    background: var(--card-face);
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.45);
    color: var(--ink);
    text-decoration: none;
    display: block;
    position: relative;
    padding: 10px 12px;
    border: 1px solid #d8d4c4;
  }

  .fan-card {
    position: absolute;
    top: 0;
    left: 50%;
    width: 150px;
    height: 215px;
    transform-origin: bottom center;
    opacity: 0;
    animation: deal 0.65s cubic-bezier(.2,.75,.25,1) forwards;
    animation-delay: var(--delay);
  }

  @keyframes deal {
    0%   { transform: translate(calc(-50% + 0px), -220px) rotate(0deg) scale(0.7); opacity: 0; }
    70%  { opacity: 1; }
    100% { transform: translate(calc(-50% + var(--x)), var(--y)) rotate(var(--rot)) scale(1); opacity: 1; }
  }

  .card .corner {
    font-family: "SFMono-Regular", Consolas, Menlo, monospace;
    font-size: 14.4px;
    line-height: 1.1;
    color: var(--ink);
  }
  .corner .suit { display: block; font-size: 15.6px; margin-top: 1px; }
  .corner.br { position: absolute; right: 10px; bottom: 8px; transform: rotate(180deg); }
  .corner.red { color: #8a1f1f; }

  .card .title {
    font-size: 15px;
    font-weight: 500;
    margin: 34px 4px 4px;
    text-align: center;
  }

  .card .desc {
    font-size: 12.6px;
    color: var(--ink-soft);
    text-align: center;
    margin: 0 4px;
  }

  .card .tag {
    position: absolute;
    left: 10px;
    bottom: 8px;
    font-size: 10.8px;
    color: var(--ink-faint);
    letter-spacing: 0.03em;
  }

  .fan-card.soon {
    background: repeating-linear-gradient(135deg, #2b2b28 0 6px, #232320 6px 12px);
    border: 1px solid #3a3936;
    border-top: 3px solid #6b1f24;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .fan-card.soon .mark { font-size: 28px; color: var(--gold); opacity: 0.55; }
  .fan-card.soon .soon-title { font-size: 13px; color: #eae7dd; margin-top: 10px; padding: 0 10px; }
  .fan-card.soon .soon-tag { font-size: 10.5px; color: #b9b6ac; margin-top: 4px; }

  .disclaimer {
    max-width: 480px;
    margin: 40px auto 0;
    text-align: left;
    border-top: 1px solid #33362f;
    padding-top: 14px;
  }
  .disclaimer-title {
    font-size: 13.2px;
    font-weight: 500;
    color: #c9c4b4;
    margin-bottom: 6px;
    text-align: center;
  }
  .disclaimer ul {
    margin: 0;
    padding-left: 18px;
    font-size: 13.2px;
    color: #a9a69c;
  }
  .disclaimer li {
    margin-bottom: 4px;
  }

  footer {
    text-align: center;
    padding: 24px 24px 60px;
    font-size: 13.2px;
    color: #8f8c82;
  }

  @media (max-width: 640px) {
    .fan { position: static; height: auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 14px; }
    .fan-card {
      position: static; margin: 0; left: auto; top: auto;
      animation: dropSimple 0.5s ease forwards;
      animation-delay: var(--delay);
    }
    @keyframes dropSimple {
      0%   { transform: translateY(-40px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
  }
</style>
</head>
<body>

<header>
  <h1>基準法のPre-Opinion</h1>
  <div class="by">by箒庵</div>
  <button class="redeal" onclick="drow()">Change</button>
</header>

<main>

  <div class="felt-panel">
    <div class="hand-label">Hand</div>
    <div class="fan" id="fan"></div>
  </div>

  <div class="disclaimer">
    <div class="disclaimer-title">免責事項</div>
    <ul>
      <li>本ツールは検討の参考用です。計算結果の正確性は保証しません。</li>
      <li>確認申請等への使用にあたっては、利用者自身の責任で告示等の根拠に基づき検証を行ってください。</li>
      <li>本ツールの使用により生じたいかなる損害についても、作成者は責任を負いません。</li>
    </ul>
  </div>

</main>

<footer>© 箒庵</footer>

<script>
  var CARDS = [
    {num:'01', suit:'♠', title:'法文墨塗り', desc:'法文を少しだけ読みやすく(告示向け)', tag:'条文読解', href:'https://ho-ki-an.github.io/legal-text-blackout/'},
    {num:'02', suit:'♠', title:'法文滑滑', desc:'デジタル版「指の栞」', tag:'条文読解', href:'https://ho-ki-an.github.io/jyoubun_sulusulu/'},
    {num:'03', suit:'♣', title:'現調表メニュー', desc:'敷地調査、現調表作成の手伝い', tag:'調査', href:'https://ho-ki-an.github.io/building-regulation-search/'},
    {num:'04', suit:'♥', title:'地盤面maker', desc:'シンプルな地盤面算定ツール', tag:'集団規定', href:'https://ho-ki-an.github.io/jiban-maker/'},
    {num:'05', suit:'♥', title:'道路斜線検討ツール', desc:'視覚的に検討(高低差緩和対応)', tag:'集団規定', href:'https://ho-ki-an.github.io/road-setback/'},
    {num:'06', suit:'♦', title:'2直checker', desc:'階段は 1or2？', tag:'単体規定', href:'https://ho-ki-an.github.io/2c-kaidan/'},
    {num:'07', suit:'♦', title:'耐火種別＋面積区画', desc:'区画開口部・遮煙を一気に', tag:'単体規定', href:'https://ho-ki-an.github.io/b-kukaku/'},
    {num:'08', suit:'♦', title:'延焼ライン', desc:'角度あり境界の検討、高さ緩和も', tag:'単体規定', href:'https://ho-ki-an.github.io/ensho_line/'},
    {num:'09', suit:'♠', title:'計画変更or軽微', desc:'判断の一助に', tag:'手続き', href:'https://ho-ki-an.github.io/kei-hen/'},
    {num:'10', suit:'♣', title:'区画避難', desc:'避難安全検証法の区画避難', tag:'高度な検討', href:'https://ho-ki-an.github.io/kukaku_hinan_b1/'},
    {num:'11', suit:'♠', title:'省エネ適判の要不要判定', desc:'いる・いらない？', tag:'手続き', href:'https://ho-ki-an.github.io/shone_hantei/'},
    {num:'12', suit:'♦', title:'歩行距離checker', desc:'最長歩行距離を確認', tag:'単体規定', href:'https://ho-ki-an.github.io/hokou_kyori/'},
    {num:'13', suit:'♠', title:'省エネ　軽微のルート判定', desc:'A/B/C ?', tag:'手続き', href:'https://ho-ki-an.github.io/shoene_route/'},
    {num:'14', suit:'♠', title:'用途変更申請の要不要判定', desc:'勘違い多数', tag:'手続き', href:'https://ho-ki-an.github.io/youto_henkou/'},
    {num:'15', suit:'♣', title:'階避難', desc:'避難安全検証法の階避難', tag:'高度な検討', href:'https://ho-ki-an.github.io/kai_hinan_b1/'},
    {soon:true, title:'確認申請はFRIへ', tag:'広告'},
    {soon:true, title:'単体規定ch', tag:'近日公開'},
    {soon:true, title:'集団規定ch', tag:'作成中'},
    {soon:true, title:'関係規定ch', tag:'作成中'},
    {soon:true, title:'一級建築士は日建学園', tag:'広告'},
    {soon:true, title:'省エネ適判はBB', tag:'広告'},
    {soon:true, title:'スッキリ爽快！朝日SAUNA', tag:'広告'},
    {soon:true, title:'広告募集中', tag:'広告'}
  ];

  var SLOTS = [
    {x:-230, y:40, rot:-16, delay:0.05},
    {x:-115, y:14, rot:-8,  delay:0.15},
    {x:0,    y:0,  rot:0,   delay:0.25},
    {x:115,  y:14, rot:8,   delay:0.35},
    {x:230,  y:40, rot:16,  delay:0.45}
  ];

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function cardHTML(item, slot, z) {
    var style = '--x:' + slot.x + 'px; --y:' + slot.y + 'px; --rot:' + slot.rot + 'deg; --delay:' + slot.delay + 's; z-index:' + z + ';';
    if (item.soon) {
      return '<div class="card fan-card soon" style="' + style + '">' +
        '<span class="mark">?</span>' +
        '<div class="soon-title">' + item.title + '</div>' +
        '<div class="soon-tag">' + item.tag + '</div>' +
        '</div>';
    }
    var isRed = (item.suit === '♥' || item.suit === '♦');
    var cornerClass = 'corner' + (isRed ? ' red' : '');
    var cornerBrClass = 'corner br' + (isRed ? ' red' : '');
    return '<a class="card fan-card" style="' + style + '" href="' + item.href + '" target="_blank" rel="noopener">' +
      '<div class="' + cornerClass + '">' + item.num + '<span class="suit">' + item.suit + '</span></div>' +
      '<div class="title">' + item.title + '</div>' +
      '<div class="desc">' + item.desc + '</div>' +
      '<div class="' + cornerBrClass + '">' + item.num + '<span class="suit">' + item.suit + '</span></div>' +
      '<div class="tag">' + item.tag + '</div>' +
      '</a>';
  }

  function deal() {
    var picked = shuffle(CARDS).slice(0, 5);
    var fan = document.getElementById('fan');
    var html = '';
    for (var i = 0; i < picked.length; i++) {
      html += cardHTML(picked[i], SLOTS[i], i + 1);
    }
    fan.innerHTML = html;
  }

  function drow() {
    deal();
  }

  deal();
</script>

</body>
</html>
